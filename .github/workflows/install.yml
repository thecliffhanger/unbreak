name: Install Latest
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  install:
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --no-cache-dir whenly unbreak structmatch configly-lib typely batchly snaplog guardly fluxrate
      - run: |
          import whenly
          import unbreak
          import structmatch
          import configly
          import typely
          import batchly
          import snaplog
          import guardly
          import fluxrate
          print("All 9 packages imported successfully")

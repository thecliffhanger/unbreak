name: Install Latest
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  install:
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install --no-cache-dir whenly unbreak structmatch configly-lib typely batchly snaplog guardly fluxrate
      - run: python3 -c "import whenly,unbreak,structmatch,configly,typely,batchly,snaplog,guardly,fluxrate; print('OK')"